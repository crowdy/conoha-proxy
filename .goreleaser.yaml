version: 2
project_name: conoha-proxy

builds:
  - id: conoha-proxy
    main: ./cmd/conoha-proxy
    binary: conoha-proxy
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildDate={{.Date}}
      - -X github.com/crowdy/conoha-proxy/internal/adminapi.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - NOTICES.md
      - README.md

dockers_v2:
  - id: conoha-proxy
    ids: [conoha-proxy]
    dockerfile: Dockerfile.release
    # Pull the linux binaries goreleaser already built under the
    # `conoha-proxy` id. `ids` filters out the darwin builds so they
    # don't end up in the docker build context. `platforms` drives
    # the multi-arch manifest — builds: already produces both
    # linux/amd64 and linux/arm64 binaries.
    images:
      - ghcr.io/crowdy/conoha-proxy
    tags:
      - "{{ .Version }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64

checksum:
  name_template: "checksums.txt"
