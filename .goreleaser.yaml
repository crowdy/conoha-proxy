version: 2
project_name: conoha-proxy

builds:
  - id: conoha-proxy
    main: ./cmd/conoha-proxy
    binary: conoha-proxy
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildDate={{.Date}}
      - -X github.com/crowdy/conoha-proxy/internal/adminapi.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - NOTICES.md
      - README.md

dockers:
  - image_templates:
      - "ghcr.io/crowdy/conoha-proxy:{{ .Version }}"
      - "ghcr.io/crowdy/conoha-proxy:latest"
    dockerfile: Dockerfile
    # Pick the linux/amd64 binary goreleaser already built under the
    # `conoha-proxy` id. Without `ids`, goreleaser may include multiple
    # goos/goarch binaries in the context and the Dockerfile `COPY
    # conoha-proxy` becomes ambiguous.
    ids: [conoha-proxy]
    goos: linux
    goarch: amd64
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"

checksum:
  name_template: "checksums.txt"
