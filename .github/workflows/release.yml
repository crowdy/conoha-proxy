name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Resolve current tag
        # Force goreleaser to use the tag that triggered this workflow.
        # Without this, if multiple tags point to the same commit (e.g. an
        # rc tag followed by the matching final tag), goreleaser's own
        # tag-detection may pick the wrong one and publish with the wrong
        # version string.
        run: echo "GORELEASER_CURRENT_TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
      - uses: actions/setup-go@v5
        with: { go-version: "1.24" }
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
