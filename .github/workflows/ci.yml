name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Verify go mod
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: Vet
        run: go vet ./...
      - name: Test with race
        run: go test -race -coverprofile=coverage.txt ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.txt | tail -1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: golangci/golangci-lint-action@v6
        with:
          # v1.61 was built with Go 1.23 and rejects our Go 1.24 target. Pin
          # a version built with a Go toolchain >= our go.mod directive.
          version: v1.64.8

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        run: docker build -t conoha-proxy:ci .
